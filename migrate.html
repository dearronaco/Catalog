<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migrasi Data – Dear Rona</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #fff5f7; }
  h2 { color: #6b2d4e; }
  button { background: #6b2d4e; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #log { margin-top: 24px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; min-height: 100px; font-size: .9rem; line-height: 1.8; white-space: pre-wrap; }
  .ok { color: green; } .err { color: red; } .info { color: #555; }
</style>
</head>
<body>
<h2>🌸 Migrasi Data Dear Rona</h2>
<p>Tool ini membaca semua produk dari koleksi <code>produk</code> (lama) dan menyalinnya ke <code>catalog/products</code> (baru) agar tampil di katalog.</p>
<p><strong>Login dulu sebagai admin:</strong></p>
<input id="email" type="email" placeholder="Email admin" style="width:100%;padding:10px;margin:4px 0;border:1px solid #ddd;border-radius:6px;box-sizing:border-box">
<input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:4px 0;border:1px solid #ddd;border-radius:6px;box-sizing:border-box">
<button onclick="runMigration()">▶ Mulai Migrasi</button>
<div id="log"><span class="info">Siap. Tekan tombol untuk mulai...</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCJosXe0V3AL-9_a5NXJ5OXk7D7hNZV9Fk",
  authDomain: "dear-rona.firebaseapp.com",
  projectId: "dear-rona",
  storageBucket: "dear-rona.firebasestorage.app",
  messagingSenderId: "553507000632",
  appId: "1:553507000632:web:46b4a57899a49215e031cd"
});
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}\n</span>`;
  el.scrollTop = el.scrollHeight;
}

window.runMigration = async function() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const btn = document.querySelector('button');
  document.getElementById('log').innerHTML = '';
  btn.disabled = true;

  try {
    log('🔐 Login sebagai admin...');
    await signInWithEmailAndPassword(auth, email, pass);
    log('✅ Login berhasil!', 'ok');

    log('📦 Membaca koleksi produk lama...');
    const snaps = await getDocs(collection(db, 'produk'));
    log(`📋 Ditemukan ${snaps.size} produk.`, 'ok');

    if (snaps.size === 0) {
      log('⚠️ Tidak ada produk di koleksi "produk". Pastikan nama koleksi benar.', 'err');
      btn.disabled = false;
      return;
    }

    const batch = writeBatch(db);
    let i = 1;
    snaps.forEach(d => {
      const old = d.data();
      // Mapping field lama → baru
      const newProduct = {
        id: Date.now() + i,
        name: old.nama || old.name || 'Produk ' + i,
        desc: old.deskripsi || old.desc || '',
        type: old.kategori || old.type || 'Bunga',
        color: old.warna || old.color || 'pink',
        emoji: old.emoji || '🌸',
        imageUrl: old.gambar || old.imageUrl || '',
        prices: old.harga ? { S: old.harga, M: old.harga, L: old.harga, XL: old.harga } : (old.prices || { S: 0, M: 0, L: 0, XL: 0 }),
      };
      const ref = doc(collection(db, 'catalog', 'products'), String(newProduct.id));
      batch.set(ref, newProduct);
      log(`  → Menyalin: ${newProduct.name}`);
      i++;
    });

    log('💾 Menyimpan ke catalog/products...');
    await batch.commit();
    log(`✅ Selesai! ${snaps.size} produk berhasil dipindahkan.`, 'ok');
    log('🎉 Refresh katalog kamu sekarang — produk harus sudah muncul!', 'ok');

  } catch (err) {
    log('❌ Error: ' + err.message, 'err');
  }
  btn.disabled = false;
};
</script>
</body>
</html>
